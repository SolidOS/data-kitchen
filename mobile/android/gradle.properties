# Capped for a low-memory host (~3GB free desktop). The default -Xmx8G would
# thrash/OOM. A tiny Flutter app builds comfortably under 1.5G; native (NDK)
# compiles run as separate clang processes outside this heap.
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=false
org.gradle.workers.max=2
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
