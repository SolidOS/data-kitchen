<sol-tabs id="dk-tabs" keep-alive>

  <a href="./plugins/home/home.html" id="panel-home"
     data-handler="sol-include"
     data-trusted
  >🏠 Home</a>

  <a href="./plugins/news/feeds.ttl#Feeds" id="panel-news"
     data-handler="sol-feed"
     data-view="threePanel"
     data-reader="inline"
  >📰 News</a>

  <a href="./plugins/ia-player/libraries/internet_archive_music/index.ttl" id="panel-music"
     data-handler="ia-player"
     data-storage-ns="music"
     data-defer
  >🎵 Music</a>

  <a href="./plugins/ia-player/libraries/internet_archive_movies/index.ttl" id="panel-movies"
     data-handler="ia-player"
     data-storage-ns="movies"
     data-favourites-only
     data-defer
  >🎬 Movies</a>

  <a href="./plugins/omp-images/libraries/wikimedia_images/images.ttl#Images" id="panel-images"
     data-handler="omp-images"
  >🖼 Images</a>

  <a href="./plugins/podz/dk-podz.html" id="panel-podz"
     data-handler="dk-podz"
     data-defer
  >🗂 Podz</a>

  <a href="./plugins/solidos/dk-solidos.html" id="panel-solidos"
     data-handler="dk-solidos"
     data-defer
  >🐧 SolidOS</a>

  <a href="./plugins/solid-resources/resources.html" id="panel-solid-resources"
     data-handler="sol-include"
     data-trusted
  >📚 Solid Resources</a>

  <a href="./plugins/dev-tools/dev-tools.html" id="panel-dev-tools"
     data-handler="sol-include"
     data-trusted
  >🛠 Dev Tools</a>

  <!-- Actions row. The bar-managed plugins (search, calendar, appearance,
       login) are user-composable via the bar builder; the help button and
       the ⋮ menu are CHROME — fixed parts of the shell, edited only by
       hand-editing this file. -->

  <sol-search class="omp-search" title="Search"
     source="./plugins/search/search-engines.ttl#SearchEngines"
  ></sol-search>

  <dk-calendar-popout class="omp-calendar" title="Calendar"
     source="./plugins/calendar/calendar-settings.ttl#All"
  ></dk-calendar-popout>

  <sol-button class="omp-fontsize" title="Text size" aria-label="Text size"
     data-handler="cycleFontSize"
  >A</sol-button>

  <sol-button class="omp-theme" title="Toggle light / dark" aria-label="Toggle light / dark"
     data-handler="toggleTheme"
  >🌙</sol-button>

  <sol-button class="omp-settings-launch" title="Settings" aria-label="Open settings"
     data-handler="sol-include"
     source="./pages/settings.html"
     inline trusted
  >⚙</sol-button>

  <sol-login class="omp-sollogin"
     mode="popup"
     popup-callback="node_modules/podz/popup-auth-callback.html"
     issuers="https://solidcommunity.net,https://solidweb.me,https://solidweb.org,https://login.inrupt.com"
  ></sol-login>

  <sol-button class="omp-help-launch" title="Help" aria-label="Help"
     data-handler="sol-include"
     source="./help/dk.html"
     if-logged-in="./help/dk-owner.html"
     inline trusted
  >?</sol-button>

  <sol-dropdown-button class="omp-more" title="More" aria-label="More"
     label="⋮"
     if-logged-in>
    <menu>
      <button data-handler="guestView">View as guest</button>
      <button data-handler="filters">Filters…</button>
      <button data-handler="viewDeleted">View deleted</button>
      <button data-handler="installPod">Install on my Pod…</button>
      <button data-handler="updateApp">Update app on Pod…</button>
    </menu>
  </sol-dropdown-button>

</sol-tabs>
