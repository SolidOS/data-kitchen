<sol-tabs id="dk-tabs" keep-alive>

  <a href="./plugins/news/feeds.ttl#Feeds" id="panel-news"
     data-handler="sol-feed"
     data-view="threePanel"
     data-reader="inline"
  >📰 News</a>

  <a href="./plugins/ia-player/libraries/internet_archive_music/index.ttl" id="panel-music"
     data-handler="ia-player"
     data-storage-ns="music"
     data-defer
  >🎵 Music</a>

  <a href="./plugins/ia-player/libraries/internet_archive_movies/index.ttl" id="panel-movies"
     data-handler="ia-player"
     data-storage-ns="movies"
     data-favourites-only
     data-defer
  >🎬 Movies</a>

  <a href="./plugins/omp-images/libraries/wikimedia_images/images.ttl#Images" id="panel-images"
     data-handler="omp-images"
  >🖼 Images</a>

  <a href="./plugins/podz/dk-podz.html" id="panel-podz"
     data-handler="dk-podz"
     data-defer
  >🗂 Workspaces</a>

  <a href="./plugins/dev-tools/dev-tools.html" id="panel-dev-tools"
     data-handler="sol-include"
     data-trusted
  >🛠 Dev Tools</a>

  <!-- Actions row. The bar-managed plugins below come from
       data/tabs.ttl#Bar (edited with the bar builder); the chrome block
       (help, ⋮ menu) is fixed shell furniture preserved by the generator. -->

  <sol-search
     class="omp-search"
     title="Search"
     source="./plugins/search/search-engines.ttl#SearchEngines"
  ></sol-search>

  <dk-calendar-popout
     class="omp-calendar"
     title="Calendar"
     source="./plugins/calendar/calendar-settings.ttl#All"
  ></dk-calendar-popout>

  <sol-button
     class="omp-fontsize"
     title="Text size"
     data-handler="cycleFontSize"
  >A</sol-button>

  <!-- chrome:begin — fixed shell chrome (help, ☰ menu, on-demand sign-in).
       NOT bar-managed and NOT in tabs.ttl; the generator preserves this
       block verbatim. Edit it here by hand if you must. -->
  <sol-button class="omp-help-launch" title="Help" aria-label="Help"
     data-handler="sol-include"
     source="./help/dk.html"
     if-logged-in="./help/dk-owner.html"
     inline trusted
  >?</sol-button>

  <!-- ☰ menu: items live in data/menu.ttl#More (Customize, Settings,
       Sign in, and the owner commands — acl:Write items hide for guests).
       Component items open in a modal (region cascade). -->
  <sol-dropdown-button class="omp-more" title="Menu" aria-label="Menu"
     label="☰"
     region="modal"
     source="./data/menu.ttl#More"
  ></sol-dropdown-button>

  <!-- Sign-in infrastructure: hidden until a flow needs it (the ☰ "Sign
       in…" item or any 401 dispatches sol-auth-needed; sol-login surfaces
       itself with [active] for the duration — see dk-chrome.css). -->
  <sol-login class="omp-sollogin"
     mode="popup"
     popup-callback="node_modules/podz/popup-auth-callback.html"
     issuers="https://solidcommunity.net,https://solidweb.me,https://solidweb.org,https://login.inrupt.com"
  ></sol-login>
  <!-- chrome:end -->

</sol-tabs>
