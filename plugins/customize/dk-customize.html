<!-- Customize — build the UI with the UI. The three sol-components builders:
     edit the topmost tabset (data/tabs.ttl#Tabs), the actions bar (#Bar),
     and drag plugins in from the palette (data/palette.ttl#Palette).
     After saving, run the generator to re-emit html-first.html:
       node tools/conversion/generate-html-first.mjs
     then reload the app. (The help button and ⋮ menu are chrome — fixed in
     html-first.html, not edited here.) -->
<div class="dk-customize">
  <p class="dk-customize-hint">
    Name menu items and bar buttons, drag plugins onto them, reorder, save.
    Saving writes the RDF (<code>data/tabs.ttl</code>); regenerate
    <code>html-first.html</code> and reload to see the new shell.
  </p>

  <sol-plugins-available
      source="data/palette.ttl#Palette"
      for="sol-menu-builder, sol-bar-builder"
  ></sol-plugins-available>

  <sol-menu-builder
      source="data/tabs.ttl#Tabs"
  ></sol-menu-builder>

  <sol-bar-builder
      source="data/tabs.ttl#Bar"
  ></sol-bar-builder>
</div>
<style>
  .dk-customize { display: flex; flex-direction: column; gap: .8rem; padding: .8rem; max-width: 60rem; }
  .dk-customize-hint { margin: 0; font-size: .85rem; color: var(--text-muted, #7f8c8d); }
</style>
