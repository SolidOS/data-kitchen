<div class="dk-home">
  <header class="dash" aria-label="Dashboard widgets">

    <!--WEATHER-->
        <sol-weather
            source="plugins/home/weather-settings.ttl#Settings"
        ></sol-weather>

    <span class="dash-sep" aria-hidden="true">·</span>

    <!--TIME-->
      <sol-time
          source="plugins/home/time-settings.ttl#Settings"
      ></sol-time>

  </header>
  <main class="feed" aria-label="News feed">

    <!--FEEDS-->
        <sol-feed
            source="plugins/home/feeds.ttl#Feeds"
            view="all"
            reader="inline"
        ></sol-feed>

  </main>
</div>
