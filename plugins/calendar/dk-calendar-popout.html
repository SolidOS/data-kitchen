<!-- chrome-btn styles the trigger like the other actions-row chips
     (assets/dk-chrome.css); the glyph is the button text, as in omp. -->
<button type="button" class="dk-popout-trigger chrome-btn"
        aria-haspopup="dialog" aria-expanded="false"
        title="Calendar" aria-label="Calendar">📅</button>
<div class="dk-popout-panel dk-calendar-panel" role="dialog" aria-label="Calendar" hidden>
  <template class="dk-calendar-tpl">
    <sol-calendar hide-header></sol-calendar>
  </template>
</div>
