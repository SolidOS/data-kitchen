<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolidOS host</title>
  <link rel="icon" href="data:,">

  <script>
    // mashlib's bundled solid-client-authn must NEVER see the shell's login
    // state. On Android the whole app shares one localhost origin, and the
    // shell's redirect-flow login leaves solidClientAuthn:* / oidc.* session
    // state in localStorage; mashlib's boot would "restore" that session with
    // a real full-frame redirect to the IdP, navigating SolidOS away (the
    // phone-only refresh loop — 2026-07-10). Shadow localStorage for THIS
    // document only, hiding those keys: the shell's storage is untouched, and
    // the panes still get dk's session via adoptAuth below. Must run before
    // any other script so nothing captures the real storage first.
    (function () {
      const HIDE = /^(solidClientAuthn:|oidc\.)/;
      const real = window.localStorage;
      const visible = () => {
        const ks = [];
        for (let i = 0; i < real.length; i++) {
          const k = real.key(i);
          if (!HIDE.test(k)) ks.push(k);
        }
        return ks;
      };
      const shim = {
        getItem: (k) => (HIDE.test(String(k)) ? null : real.getItem(k)),
        setItem: (k, v) => { if (!HIDE.test(String(k))) real.setItem(k, v); },
        removeItem: (k) => { if (!HIDE.test(String(k))) real.removeItem(k); },
        key: (i) => visible()[i] ?? null,
        clear: () => { for (const k of visible()) real.removeItem(k); },
        get length() { return visible().length; },
      };
      try {
        Object.defineProperty(window, 'localStorage', { value: shim, configurable: true });
      } catch (_) { /* platform refused — fall back to the real storage */ }
    })();
  </script>

  <!-- mashlib's own stylesheet. It lives INSIDE this iframe, so its global
       selectors (html, body, a, table, button) style only this document — they
       cannot leak into the dk chrome. This is the whole point of the iframe:
       proper SolidOS display + zero leak. -->
  <link rel="stylesheet" href="/node_modules/mashlib/dist/mash.css">
  <style>
    html, body { margin: 0; height: 100%; }
    #solHost { height: 100vh; width: 100%; }
    #sol-loading {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: #1f2933;
    }
    #sol-loading.hidden { display: none; }
    #sol-loading .ring {
      width: 2.2rem; height: 2.2rem; border: 4px solid #3e4c59;
      border-top-color: #4fd1c5; border-radius: 50%;
      animation: sol-spin 0.8s linear infinite;
    }
    @keyframes sol-spin { to { transform: rotate(360deg); } }

    /* Phone (coarse pointer): scoped best-effort fit for mashlib inside
       this frame — mashlib's own CSS floors the body at 375px, which
       h-scrolls a 360px WebView. Un-floor it and give the dense outline
       rows a touch-friendly height (measured 27px). Desktop-in-frame is
       untouched (media-gated); mashlib itself is unmodified. */
    @media (hover: none) and (pointer: coarse) {
      html, body { min-width: 0 !important; max-width: 100vw; }
      #solHost, sol-solidos, main#MainContent { max-width: 100vw; }
      #OutlineView td.pred, #OutlineView td.obj {
        padding-top: 8px; padding-bottom: 8px;
      }
    }
  </style>

  <!-- Vendored ESM deps for sol-components (same set sol-components/dashboard and
       the old solidos-host used). sol-solidos.js + its core/* imports resolve bare
       specifiers through this map. mashlib.min.js is a classic bundle (ignores the
       map) and sets window.panes / Mashlib / SolidLogic / $rdf itself. -->
  <script type="importmap">
  {
    "imports": {
      "rdflib":                              "/node_modules/sol-components/dist/vendor/rdflib.js",
      "n3":                                  "/node_modules/sol-components/dist/vendor/n3.js",
      "dompurify":                           "/node_modules/sol-components/dist/vendor/dompurify.js",
      "ical.js":                             "/node_modules/sol-components/dist/vendor/ical.js.js",
      "marked":                              "/node_modules/sol-components/dist/vendor/marked.js",
      "rdf-validate-shacl":                  "/node_modules/sol-components/dist/vendor/rdf-validate-shacl.js",
      "@comunica/query-sparql":              "/node_modules/sol-components/dist/vendor/@comunica-query-sparql.js",
      "solid-ui":                            "/node_modules/sol-components/dist/vendor/solid-ui.js",
      "solid-logic":                         "/node_modules/sol-components/dist/vendor/solid-logic.js",
      "@inrupt/solid-client-authn-browser":  "/node_modules/sol-components/dist/vendor/@inrupt-solid-client-authn-browser.js"
    }
  }
  </script>

  <script>
    // The parent (plugins/solidos/dk-solidos.js) shares dk's authenticated fetch
    // by calling adoptAuth(fetch, {webId}) on this iframe — component-interop's
    // auth channel. getAuthFetch() (read by the patched window.fetch inside
    // sol-solidos) returns this as window.SolidWebComponents.adoptedFetch, so every
    // mashlib pane request inherits dk's session (local OR remote). Standalone use
    // (?uri=… with no parent) just falls through to anonymous fetch.
    window.SolidWebComponents = window.SolidWebComponents || {};
    window.adoptAuth = function (fetchFn, info) {
      if (typeof fetchFn !== 'function') return;
      const swc = window.SolidWebComponents;
      if (typeof swc.adoptFetch === 'function') { try { swc.adoptFetch(fetchFn, info || {}); return; } catch (_) {} }
      swc.adoptedFetch = fetchFn;
      if (info && info.webId) swc.adoptedWebId = info.webId;
    };
  </script>
</head>
<body>
  <div id="sol-loading" role="status" aria-label="Loading"><div class="ring"></div></div>
  <div id="solHost"></div>
  <script>
    // Loading spinner: SolidOS / dokieli embeds pull a large mashlib bundle and
    // do remote pod fetches, so the frame is blank for several seconds. Show a
    // spinner until the data browser has rendered content (or a timeout fallback).
    (function () {
      const spin = document.getElementById('sol-loading');
      if (!spin) return;
      let done = false;
      const hide = () => {
        if (done) return; done = true;
        spin.classList.add('hidden');
        try { obs.disconnect(); } catch (_) {}
        clearTimeout(t);
      };
      const ready = () => {
        const ov = document.getElementById('OutlineView');
        if (ov && ov.childElementCount > 0) return true;
        const dash = document.getElementById('GlobalDashboard');
        if (dash && dash.childElementCount > 0 && !dash.hidden) return true;
        return false;
      };
      const obs = new MutationObserver(() => { if (ready()) hide(); });
      obs.observe(document.body, { childList: true, subtree: true });
      const t = setTimeout(hide, 30000);  // fallback so we never spin forever
    })();
  </script>

  <script type="module">
    try {
      // 1) load mashlib (classic bundle → window.panes / Mashlib / SolidLogic / $rdf)
      await new Promise((res) => {
        const s = document.createElement('script');
        s.src = '/node_modules/mashlib/dist/mashlib.min.js';
        s.onload = res; s.onerror = res;
        document.head.appendChild(s);
      });
      for (let i = 0; i < 120 && !window.panes; i++) await new Promise(r => setTimeout(r, 50));

      // 2) give the parent a brief moment to hand auth in before the first fetch
      if (window.top !== window) await new Promise(r => setTimeout(r, 300));

      // 3) register + mount the (fixed) sol-solidos for the requested subject.
      //    Imported by absolute path; its `../core/*` imports resolve by URL and its
      //    bare deps (rdflib, …) resolve through the importmap above.
      await import('/node_modules/sol-components/web/sol-solidos.js');
      const params = new URLSearchParams(location.search);
      const source = params.get('source') || (location.origin + '/dk-pod/');
      const el = document.createElement('sol-solidos');
      el.setAttribute('source', source);
      if (params.get('bar')) el.setAttribute('has-location-bar', 'true');
      document.getElementById('solHost').appendChild(el);

      // dk shell guard: never let SolidOS open the app shell (/index.html or the
      // server root /) — that would load the whole app recursively (a "wormhole").
      // Redirect such navigation to the /dk-pod/ container so the user gets the
      // SolidOS folder view instead. Hook the outliner's GotoSubject (used by both
      // link clicks and programmatic navigation).
      try {
        const outliner = window.panes.getOutliner(document);
        if (outliner && outliner.GotoSubject && !outliner.__dkShellGuard) {
          outliner.__dkShellGuard = true;
          const origGoto = outliner.GotoSubject.bind(outliner);
          outliner.GotoSubject = function (subject) {
            let subj = subject;
            try {
              const uri = subject && subject.uri;
              // Both the server root '/' and the app shell '/index.html'
              // content-negotiate to dk's own index.html (a "wormhole" that
              // loads the whole app inside the frame and blanks the SolidOS
              // view). Divert BOTH to the /dk-pod/ container so navigation —
              // e.g. clicking the Solid logo to go "home" — lands on the
              // SolidOS folder view instead.
              if (uri === location.origin + '/index.html' || uri === location.origin + '/') {
                subj = window.$rdf.sym(location.origin + '/dk-pod/');
              }
            } catch (_) {}
            const args = Array.prototype.slice.call(arguments);
            args[0] = subj;
            return origGoto.apply(this, args);
          };
        }
      } catch (_) {}

      // parent-driven navigation (set a new subject without reloading the iframe)
      window.solSetSource = (uri) => { if (uri) el.setAttribute('source', uri); };

      // parent-fed pod-location quick-picks for the location bar dropdown (dk forwards
      // the pods sol-pod has discovered in via dk-solidos.js).
      window.solSetLocations = (list) => { try { el.locations = list; } catch (_) {} };

      // Mint a blank dokieli document in folderUrl and open it (used by dk-dokieli
      // when there is no last-visited doc). mintNew PUTs the dokieli template through
      // the store's fetcher → the page's authed fetch, so it rides dk's session.
      window.newDokieli = async (folderUrl) => {
        const SL = window.SolidLogic && window.SolidLogic.solidLogicSingleton;
        const store = SL && SL.store;
        const pane = window.panes && window.panes.byName && window.panes.byName('Dokieli');
        if (!store || !pane || !pane.mintNew || !folderUrl) return null;
        if (!folderUrl.endsWith('/')) folderUrl += '/';
        try {
          const res = await pane.mintNew({ session: { store }, dom: document },
            { newBase: folderUrl + 'note-' + Date.now() });
          const uri = res && res.newInstance && res.newInstance.uri;
          if (uri) { window.solSetSource(uri); return uri; }
        } catch (e) { console.warn('[sol-solidos-host] newDokieli failed', e); }
        return null;
      };

      window.solHostReady = true;
    } catch (e) {
      window.solHostError = String(e && e.stack || e);
      console.error('[sol-solidos-host]', e);
    }
  </script>
</body>
</html>
