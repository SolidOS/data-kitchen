<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dropdown repro</title>
  <link rel="icon" href="data:,">
  <!-- Same chrome styles as the real app, so the dropdown styling mismatch
       (if any) reproduces here. Root-absolute paths: serve from repo root.
       ia.css defines the --ia-* theme tokens the chrome bridges onto
       --surface/--text/etc — without it the popup colours don't match. -->
  <link rel="stylesheet" href="/node_modules/sol-components/web/styles/root.css">
  <link rel="stylesheet" href="/plugins/ia-player/assets/ia.css">
  <link rel="stylesheet" href="/src/dk-styles.css">
  <link rel="stylesheet" href="/assets/dk-chrome.css">

  <!-- Same loader as index.html, but only the sol-components manifest (no pod)
       and a minimal component set: the clock + the menu-from-rdf add-on. -->
  <script src="/node_modules/component-interop/component-interop.js"
          data-stage="auto"
          data-manifest="/node_modules/sol-components/dist/sol-components.manifest.json"
          data-components="sol-basic sol-time menu-from-rdf"
  ></script>
</head>
<body>
  <main id="dk-content" class="omp-panels">
    <sol-tabs id="dk-tabs" keep-alive
              from-rdf="/claude/smoke-tests/dropdown-repro.ttl#Tabs"
              data-settings-skip></sol-tabs>
  </main>
</body>
</html>
