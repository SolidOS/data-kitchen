<!-- Customize subtab 1 — define the main menu tabs (above) and the button
     bar (below): name items, reorder, remove; drop a plugin on either to
     set what it opens. Every change auto-saves to data/tabs.ttl and the
     shell updates itself. -->
<div class="dk-define-menus">
  <p class="dk-define-menus-hint">
    Name the menu tabs and the bar buttons, drag to reorder, ✕ to remove.
    Drop a plugin on an item to set what it opens. Changes save automatically.
  </p>

  <sol-menu-manager
      source="data/tabs.ttl#Tabs"
      catalog="data/plugins-catalog.ttl#Available"
  ></sol-menu-manager>

  <sol-button-bar-manager
      source="data/tabs.ttl#Bar"
      catalog="data/plugins-catalog.ttl#Available"
  ></sol-button-bar-manager>
</div>
<style>
  /* menus above, bar below; each editor scrolls its own rows — never the
     page or the pane */
  .dk-define-menus { display: flex; flex-direction: column; gap: .8rem; padding: .8rem; max-width: 60rem;
                     flex: 1 1 auto; min-height: 0; overflow: hidden; }
  .dk-define-menus-hint { margin: 0; flex: 0 0 auto; font-size: max(16px, var(--font-size, 1rem)); color: var(--text-muted, #7f8c8d); }
  .dk-define-menus > sol-menu-manager,
  .dk-define-menus > sol-button-bar-manager { flex: 0 1 auto; min-height: 0; }
</style>
