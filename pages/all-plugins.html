<!-- All Plugins — the whole catalog (data/plugins-catalog.ttl#All) in one
     grouped box, in use or not. Opened from the ☰ menu; displays in the
     #dk-menu-pane like the other menu items. -->
<div class="dk-all-plugins">
  <sol-plugin-manager
      grouped
      source="data/plugins-catalog.ttl#All"
  ></sol-plugin-manager>
</div>
<style>
  /* the box scrolls its own cards area — never the page or the pane */
  .dk-all-plugins { display: flex; flex-direction: column; padding: .8rem; max-width: 60rem;
                    flex: 1 1 auto; min-height: 0; overflow: hidden; }
  .dk-all-plugins > sol-plugin-manager { flex: 1 1 auto; min-height: 0; }
</style>
