<!-- Manage Menus — build the UI with the UI. The three sol-components managers:
     edit the topmost tabset (data/tabs.ttl#Tabs), the actions bar (#Bar),
     and drag plugins in from the Plugins-to-Use list (data/plugins-catalog.ttl#InUse
     — curated by the linked Manage Plugins item on the ☰ menu).
     After saving, run the generator to re-emit html-first.html:
       node tools/conversion/generate-html-first.mjs
     then reload the app. (The help button and ⋮ menu are chrome — fixed in
     html-first.html, not edited here.) -->
<div class="dk-customize">
  <p class="dk-customize-hint">
    Name menu items and bar buttons, drag plugins onto them, reorder, save.
    Saving writes the RDF (<code>data/tabs.ttl</code>); regenerate
    <code>html-first.html</code> and reload to see the new shell. The plugins
    offered here are the <em>Plugins to Use</em> list — curate it with
    <em>Manage Plugins</em> (☰ menu).
  </p>

  <sol-plugin-manager
      source="data/plugins-catalog.ttl#InUse"
      for="sol-menu-manager, sol-button-bar-manager"
  ></sol-plugin-manager>

  <sol-menu-manager
      source="data/tabs.ttl#Tabs"
  ></sol-menu-manager>

  <sol-button-bar-manager
      source="data/tabs.ttl#Bar"
  ></sol-button-bar-manager>
</div>
<style>
  /* each editor scrolls its own list (cards / rows) — never the page or
     the pane; the column squeezes the three boxes to fit */
  .dk-customize { display: flex; flex-direction: column; gap: .8rem; padding: .8rem; max-width: 60rem;
                  flex: 1 1 auto; min-height: 0; overflow: hidden; }
  .dk-customize-hint { margin: 0; flex: 0 0 auto; font-size: max(16px, var(--font-size, 1rem)); color: var(--text-muted, #7f8c8d); }
  .dk-customize > sol-plugin-manager,
  .dk-customize > sol-menu-manager,
  .dk-customize > sol-button-bar-manager { flex: 0 1 auto; min-height: 0; }
</style>
