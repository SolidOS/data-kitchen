<!-- Manage Plugins — the two plugin lists (data/plugins-catalog.ttl#InUse / #Available).
     Drag a card between the boxes to move it; drag a manifest URL in (or type
     it in a box's input row) to add a plugin; every change auto-saves to the
     RDF. The "Plugins to Use" list is the palette the linked Manage Menus
     item (☰ menu) offers for building the tab menu and button bar. -->
<div class="dk-manage-plugins">
  <p class="dk-manage-plugins-hint">
    Drag plugins between the two lists; add one by dropping or typing its
    manifest URL. Changes save automatically
    (<code>data/plugins-catalog.ttl</code>). Put a plugin in <em>Plugins to Use</em>
    to offer it in <em>Manage Menus</em> (☰ menu), where you place it on the
    tab menu or button bar.
  </p>

  <sol-plugin-manager
      grouped
      source="data/plugins-catalog.ttl#Available"
  ></sol-plugin-manager>

  <sol-plugin-manager
      source="data/plugins-catalog.ttl#InUse"
  ></sol-plugin-manager>

  <div class="dk-access">
    <div class="dk-access-title">3. Access the Plugin</div>
  </div>
</div>
<style>
  /* Three columns, left to right: Available (two cards wide), Plugins to
     Use (one card wide), Access (same size, empty for now). Each box
     scrolls ITS OWN cards area — never the page or the pane.
     --card-w mirrors the card width in the manager (18em of the user font
     size); the column widths are cards + the box's own padding/border. */
  .dk-manage-plugins { --card-w: calc(var(--font-size, 1rem) * 18);
                       --col-1: calc(var(--card-w) + 1.4rem + 2px);
                       --col-2: calc(var(--card-w) * 2 + .45rem + 1.4rem + 2px);
                       display: flex; align-items: stretch; gap: .8rem; padding: .8rem; flex-wrap: wrap;
                       flex: 1 1 auto; min-height: 0; overflow: hidden; }
  .dk-manage-plugins-hint { flex: 1 1 100%; margin: 0; align-self: flex-start; font-size: max(16px, var(--font-size, 1rem)); color: var(--text-muted, #7f8c8d); }
  .dk-manage-plugins > sol-plugin-manager { min-height: 0; max-height: 100%; }
  .dk-manage-plugins > sol-plugin-manager[source$="#Available"] { flex: 0 1 var(--col-2); min-width: var(--col-1); }
  .dk-manage-plugins > sol-plugin-manager[source$="#InUse"] { flex: 0 1 var(--col-1); min-width: var(--col-1); }
  .dk-access { flex: 0 1 var(--col-1); min-width: var(--col-1); min-height: 0; max-height: 100%;
               border: 1px solid var(--border, #d0d0d0); border-radius: 10px;
               background: var(--surface, #fff); padding: .6rem .7rem; }
  .dk-access-title { font-weight: 700; font-size: max(16px, var(--font-size, 1rem)); }
</style>
