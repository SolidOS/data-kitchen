<!-- Customize subtab 1 — choose plugins. ONE component does everything
     (plugin-manifest-unification, 2026-07-18): <sol-plugin-manager> gathers
     + presents the catalog of ui:Plugin entries (topic tabs, drag/drop, ＋ add
     opens a :PluginShape form that creates a new manifest + catalog entry)
     AND — having no `for` attribute — DISCOVERS the app's
     plugin-holding UI slots (any element declaring a menu source whose root
     menus hold plugin references: today the tab tree, the button bar, and
     the ☰ menu) and presents a "Customize <label>" editor for each. Every
     change auto-saves; each box scrolls its own list, never the page. -->
<div class="dk-choose-plugins">
  <sol-plugin-manager
      grouped
      source="dk-pod/dk/ui-data/data-kitchen-plugins-catalog.ttl#Available"
  ></sol-plugin-manager>
</div>
<style>
  /* The component owns the cards|targets two-region layout; the page only
     sizes the pane box. Panels sit 1rem below the subtab bar (the sub
     variant's bar already brings 12px margin-bottom). */
  .dk-choose-plugins { display: flex; flex: 1 1 auto; min-height: 0; overflow: hidden;
                       padding: calc(1rem - 12px) .8rem .8rem; }
  .dk-choose-plugins > sol-plugin-manager { flex: 1 1 auto; min-width: 0; min-height: 0; }
</style>
