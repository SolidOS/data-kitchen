<section class="dk-settings">
  <header class="dk-settings-head">
    <h2>Settings</h2>
  </header>

  <!-- Data Kitchen: theme / text size / CORS proxy / help document, all from the
       shape-driven form over data-kitchen-settings.ttl; plus the sign-in issuer
       list (first = default). data-settings-skip keeps this form out of the
       Plugins accordion below (its shape would otherwise re-list it there). -->
  <section class="dk-settings-group">
    <h3>Data Kitchen</h3>
    <sol-form
        data-settings-skip
        subject="./dk-pod/dk/ui-data/data-kitchen-settings.ttl#Settings"
        save-to="./dk-pod/dk/ui-data/data-kitchen-settings.ttl#Settings"
        shape="node_modules/sol-components/shapes/data-kitchen-settings.shacl"
    ></sol-form>
    <dk-issuers-editor
        source="./dk-pod/dk/ui-data/data-kitchen-settings.ttl#Settings"
    ></dk-issuers-editor>
    <!-- Pod locations: the ordered storage list feeding every pod selector
         (podz Pod Browser, SolidOS Locations). Shape-driven rolodex over
         #Locations in the same settings doc — reorder with the ↑/↓ arrows
         (schema:position); src/dk-locations-feed.js syncs the list into the
         shared runtime pod registry. -->
    <sol-form
        data-settings-skip
        subject="./dk-pod/dk/ui-data/data-kitchen-settings.ttl#Locations"
        save-to="./dk-pod/dk/ui-data/data-kitchen-settings.ttl#Locations"
        shape="node_modules/sol-components/shapes/pod-locations.shacl"
    ></sol-form>
  </section>

  <!-- Per-plugin settings, RDF-driven and gated on catalog "in-use" status:
       <dk-plugin-settings> renders a shape-driven <sol-form> for each plugin that
       (a) is wired into the active shell (menu=) and (b) declares settings in its
       own manifest (shape + a settings .ttl; subject = the doc's foaf:primaryTopic)
       — independent of whether its tab is mounted, and with nothing duplicated
       here. The forms carry data-settings-skip so the discovery accordion below
       never lists them twice; dk-settings-applier re-applies a save to any mounted
       pods. -->
  <dk-plugin-settings
      menu="./dk-pod/dk/ui-data/data-kitchen-main-menu.ttl"
  ></dk-plugin-settings>

  <!-- Electron (window size/position) + Pivot (server ports, pod root). These
       live in the JSON-LD electron-config read by the desktop main process at
       launch, so this component edits them over the preload IPC bridge rather
       than the pod RDF above. -->
  <dk-config-settings></dk-config-settings>

  <!-- Plugins: every editable widget the running page mounts (calendar, weather,
       time, …) auto-discovered and shown as an accordion. -->
  <section class="dk-settings-group">
    <h3>Plugins</h3>
    <sol-settings></sol-settings>
  </section>
</section>
