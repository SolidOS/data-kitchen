<section class="dk-settings">
  <header class="dk-settings-head">
    <h2>Settings</h2>
  </header>

  <!-- Preferences (theme / text size / proxy) — shown open on the page, not
       behind an accordion: the same shape-driven form sol-settings would
       build for <sol-default> (which carries data-settings-skip in
       index.html so the accordion below doesn't repeat it). -->
  <!-- (data-settings-skip: its shape= would otherwise make the form itself
       show up in the accordion below.) -->
  <sol-form
      data-settings-skip
      subject="./dk-pod/dk/data/data-kitchen-settings.ttl#Settings"
      save-to="./dk-pod/dk/data/data-kitchen-settings.ttl#Settings"
      shape="node_modules/sol-components/shapes/data-kitchen-settings.shacl"
  ></sol-form>

  <!-- Settings of the plugins in use (search, calendar, weather, … —
       whatever editable components the running page mounts). -->
  <sol-settings></sol-settings>
</section>
