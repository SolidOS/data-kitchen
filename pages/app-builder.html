<!-- App Builder — build a standalone app on your pod (app-builder,
     2026-07-19). ONE sol-components element does everything: pick/create an
     app folder under /dk-pod/apps/, choose an RDF layout preset, edit the
     app's menus with the same managers Customize uses, pick plugins from the
     dk catalog, then GENERATE a readable index.html + app.css (every element
     names its module / source / from-rdf visibly). Publishing adds a
     ui:Plugin (kind ui:Link) entry to the catalog — the owner places it via
     Customize; no menu is written. -->
<div class="dk-app-builder">
  <sol-app-builder
      apps-root="dk-pod/apps/"
      presets="/node_modules/sol-components/data/layouts/index.ttl"
      catalog="dk-pod/dk/ui-data/data-kitchen-plugins-catalog.ttl#Available"
  ></sol-app-builder>
</div>
<style>
  /* The pane box scrolls the builder's content; the page never scrolls. */
  .dk-app-builder { flex: 1 1 auto; min-height: 0; overflow: auto;
                    padding: 1rem .8rem .8rem; }
</style>
