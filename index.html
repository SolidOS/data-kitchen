<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Media Player</title>
  <script src="./src/omp-boot.js"></script>
  <link rel="stylesheet" href="./assets/omp.css">
  <!-- sol-loader (parser-blocking <head> script) loads EVERYTHING: the swc
       components (sol-basic, sol-feed, sol-gallery) + auth, AND ia-player itself —
       ia-player is just another bundle, resolved via its own manifest. The loader
       injects the importmap first, then import()s each bundle, so ia-player's
       `import 'rdflib'` resolves to the one shared rdflib with no separate
       <script> tag and no load-order race. -->

  <script src="../solid-web-components/dist/sol-loader.min.js"
          data-stage="local"
          data-bundles="sol-basic sol-feed sol-gallery ia-player"
          data-extend-with="auth"
          data-manifest="ia-player.manifest.json"
  ></script>
</head>
<body>

  <sol-default
     proxy="http://localhost:3002/proxy?uri="
     theme="dark"
     fontsize="medium"
     solid-kitchen
     data-settings="./data/generated/settings.ttl#Settings"
  ></sol-default>

  <nav class="omp-chrome-bar" aria-label="Controls">
    <sol-include
       source="assets/mini-player.html"
       trusted
    ></sol-include>
  </nav>

  <main class="omp-panels">
    <sol-include id="omp-body" trusted></sol-include>
  </main>

  <script type="module" src="./src/omp-shell.js"></script>
</body>
</html>
