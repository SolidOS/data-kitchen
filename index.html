<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>data-kitchen</title>

  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="node_modules/sol-components/web/styles/root.css">
  <link rel="stylesheet" href="src/dk-styles.css">

  <script>
    (function () {
      try {
        const s = JSON.parse(localStorage.getItem('data-kitchen-settings') || '{}');
        if (s.theme)    document.documentElement.dataset.theme = s.theme;
        if (s.fontSize) document.documentElement.style.setProperty('--font-size', s.fontSize);
      } catch (_) { /* localStorage disabled — first paint uses defaults */ }
    })();
    // One-shot: wipe podz's persisted pod-registry seed AND the
    // last-viewed pod selection so the next dk load takes podz's
    // fresh-session path (leftPod.initialize() with no `source=` and an
    // empty registry → sol-pod.discover() actually runs, [pod-ops]
    // trace appears). Bump the flag (v2 → v3 → …) to re-clear later.
    (function () {
      try {
        if (localStorage.getItem('dk-cleared-session-pods-v2')) return;
        const raw = localStorage.getItem('podz_v4');
        if (raw) {
          const blob = JSON.parse(raw);
          delete blob.sessionPods;
          delete blob.selection;
          localStorage.setItem('podz_v4', JSON.stringify(blob));
        }
        // Legacy keys, in case an old podz version still wrote them.
        localStorage.removeItem('podz_session_pods');
        localStorage.removeItem('podzPodSelection');
        localStorage.setItem('dk-cleared-session-pods-v2', '1');
      } catch (_) {}
    })();
  </script>

  <!-- component-interop (parser-blocking <head> script) reads both manifests —
       sol-components' first (it owns the shared specifiers: rdflib, solid-ui,
       solid-logic, …; merge is first-wins), dk's second (adds podz only) — and
       injects the stage-selected importmap, then import()s each data-components
       entry. data-stage="auto": localhost → vendored deps (dist/vendor/*),
       else → esm.sh CDN. The old data-extend-with capabilities are now just
       named components: auth ⇒ sol-login, sparql ⇒ sol-query, rdf editing ⇒
       rdf-bundle (solid-logic → solid-ui → sol-form/modal/settings/tree-edit);
       data-edit-shape on <sol-default> also auto-loads rdf-bundle.
       dk's OWN bundle is loaded directly as a module below (not via the loader),
       so it stays out of the loader's import chain — no readiness deadlock. -->

  <script src="node_modules/component-interop/component-interop.js"
          data-stage="auto"
          data-manifest="node_modules/sol-components/dist/sol-components.manifest.json dk.manifest.json"
          data-components="sol-basic sol-pod sol-pod-extras sol-live-edit sol-time sol-weather sol-calendar sol-search sol-feed sol-login sol-query menu-from-rdf rdf-bundle"
  ></script>
  <script type="module" src="dist/dk.bundle.js"></script>
</head>
<body>
    <!-- DEFAULT -->
      <sol-default
          label="Preferences"
          default-issuer="https://solidcommunity.net"
          shape="node_modules/sol-components/shapes/data-kitchen-settings.shacl"
          source="data/data-kitchen-settings.ttl#Settings"
      ></sol-default>

  <header class="dk-chrome">

    <!--MAIN MENU-->
        <sol-menu
            from-rdf="data/menu.ttl#MainMenu"
            orientation="horizontal"
            region="#dk-content"
        ></sol-menu><div class="dk-chrome-spacer"></div>

    <!--SEARCH-->
        <sol-search
            source="data/search-engines.ttl#SearchEngines"
        ></sol-search>

    <!--CALENDAR-->
        <dk-calendar-popout
            source="data/calendar-settings.ttl#All"
        ></dk-calendar-popout>

    <!--LOGIN-->
        <sol-login
            mode="popup"
            popup-callback="node_modules/podz/popup-auth-callback.html"
            issuers="https://solidcommunity.net,https://solidweb.me,https://solidweb.org,https://login.inrupt.com"
        ></sol-login>

    <!--HELP-->
        <sol-button
            data-handler="sol-include"
            source="help/dk.html"
            region="#dk-content" name="Help" trusted
            title="Help" aria-label="Open help"
        ></sol-button>

    <!--SETTINGS-->
        <sol-button
            data-handler="sol-include"
            source="pages/settings.html"
            region="#dk-content" name="Settings" trusted
            title="Settings" aria-label="Open settings"
        ></sol-button>

  </header>

  <main id="dk-content">
    <div data-menu-item="Home">
      <header class="dash" aria-label="Dashboard widgets">

        <!--WEATHER-->
            <sol-weather
                source="data/weather-settings.ttl#Settings"
            ></sol-weather>

        <span class="dash-sep" aria-hidden="true">·</span>

        <!--TIME-->
          <sol-time
              source="data/time-settings.ttl#Settings"
          ></sol-time>

      </header>
      <main class="feed" aria-label="News feed">

        <!--FEEDS-->
            <sol-feed
                source="data/feeds.ttl#Feeds"
                view="all"
                reader="inline"
            ></sol-feed>

      </main>
    </div>
  </main>

</body>
</html>
