<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- viewport-fit=cover lets the mobile look's env(safe-area-inset-*) rules
       (in dk-chrome.css, behind a touch media query) read the notch / home-bar
       insets on phones. Inert on desktop Electron (no insets â†’ env() is 0). -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- Wormhole guard (must run first): the app shell must never run inside a
       frame â€” opening /index.html from a SolidOS listing would load the whole app
       recursively. Externalized to src/ so this page can carry a strict CSP with
       no inline scripts; still a classic parser-blocking script, so it runs before
       anything else. -->
  <script src="src/dk-wormhole-guard.js"></script>
  <title>data-kitchen</title>

  <link rel="icon" href="assets/dk-logo.ico">
  <link rel="stylesheet" href="node_modules/sol-components/web/styles/root.css">
  <link rel="stylesheet" href="src/dk-styles.css">
  <link rel="stylesheet" href="assets/dk-chrome.css">

  <!-- Pre-paint boot: apply saved theme / text size before first paint. -->
  <script src="src/dk-boot.js"></script>

  <!-- sol-login reads the inrupt auth library from a window global. sc ships
       it only as an ESM build (which sets no global), so publish that build onto
       window.solidClientAuthn (see src/dk-inrupt-global.js) â€” no separately-vendored
       UMD bundle to drift. Externalized to src/ so this page can carry a strict CSP
       with no inline scripts. -->
  <script type="module" src="src/dk-inrupt-global.js"></script>

  <!-- component-interop (parser-blocking <head> script) reads both manifests â€”
       sol-components' first (it owns the shared specifiers: rdflib,
       solid-logic, solid-ui, â€¦; merge is first-wins), dk's second (adds the
       ia-player plugin bundle and podz) â€” injects the stage-selected
       importmap, then import()s each data-components entry. Pane widgets not listed
       here (sol-time, sol-weather, sol-query) lazy-load on first mount via
       ensureHandler; the media player loads via its menu items' ui:module. dk's OWN bundle
       is loaded directly as a module below (not via the loader), so it stays
       out of the loader's import chain. -->
  <script src="node_modules/component-interop/component-interop.js"
          data-stage="auto"
          data-manifest="node_modules/sol-components/dist/sol-components.manifest.json dk-pod/dk/dk.manifest.json dk-pod/dk/dokieli.manifest.json node_modules/open-media-player/omp.manifest.json"
          data-components="sol-basic sol-pod-bundle sol-form-bundle sol-calendar sol-search sol-feed sol-gallery sol-login sol-menu-manager sol-button-bar-manager sol-plugin-manager"
          data-objects="webid:data-kitchen auth:sol-components"
  ></script>
  <script type="module" src="dist/dk.bundle.js"></script>
</head>
<body>

  <!-- Skip link: first focusable element, hidden until focused (see dk-styles.css),
       so keyboard users can jump past the chrome bar straight to the content. -->
  <a class="dk-skip-link" href="#dk-content">Skip to content</a>

  <!-- The shared-defaults singleton, RDF-driven like the rest of the shell: its
       VALUES (color scheme, text size, CORS proxy) come from the `source` RDF â€”
       sol-default reads each ui: predicate into a kebab attribute
       (ui:colorSchemeâ†’color-scheme, ui:fontSizeâ†’font-size, ui:proxyâ†’proxy). The
       markup names ONLY the structural anchors: `source` (what it loads),
       `shape` (the SHACL that drives the editable form), `solid-kitchen` (the
       dev write flag), `label` (the form's title). No inline value overrides â€”
       so nothing here shadows the RDF.
       data-settings-skip: preferences render as the open form at the top of the
       settings page (pages/settings.html), not as an accordion panel. -->
  <sol-default
      data-settings-skip
      label="Preferences"
      solid-kitchen
      shape="node_modules/sol-components/shapes/data-kitchen-settings.shacl"
      source="dk-pod/dk/ui-data/data-kitchen-settings.ttl#Settings"
  ></sol-default>

  <nav class="omp-chrome-bar" aria-label="Controls">
    <sol-include source="dk-pod/dk/plugins/ia-player/assets/mini-player.html" trusted></sol-include>
  </nav>

  <main id="dk-content" class="omp-panels" tabindex="-1">
    <!-- The topmost tabset renders from the RDF shell model: tabs are the
         ui:parts of ui-data/data-kitchen-main-menu.ttl#Tabs (via the menu-from-rdf add-on already in
         the loader list above); the #Bar / #Chrome launchers of the same
         document are built at load by src/dk-tabs-rdf.js. To edit the shell as
         HTML instead, round-trip it: npm run rdf2html / npm run html2rdf. -->
    <!-- data-settings-skip: the tabset's own menu editor stays OUT of the
         Customize Preferences accordion â€” tabs/menus are edited on the
         Customize Plugins page. (sol-settings' opt-out; children like
         search/calendar are still discovered.) -->
    <sol-tabs id="dk-tabs" keep-alive from-rdf="./dk-pod/dk/ui-data/data-kitchen-main-menu.ttl#Tabs" data-settings-skip></sol-tabs>

    <!-- The â˜° menu's component items (claimed here by id via data-for) display
         in this pane, which replaces the tab content area while open â€” not in
         a modal. dk-tabs-shell re-homes it into the tabset's content once the
         shell is built and hides it again when a tab is picked. -->
    <div id="dk-menu-pane" class="dk-menu-pane"
         data-for="MoreCustomize MoreAllPlugins MoreSettings" hidden></div>
  </main>

</body>
</html>
