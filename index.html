<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Media Player</title>
  <script src="./src/omp-boot.js"></script>
  <link rel="stylesheet" href="./assets/omp.css">
  <!-- sol-login reads the inrupt auth library from the UMD global
       window.solidClientAuthn, so the page must load it first. -->
  <script src="https://cdn.jsdelivr.net/npm/@inrupt/solid-client-authn-browser@4/dist/solid-client-authn.bundle.js"></script>

  <!-- component-interop loads the sol-components this app uses + ia-player itself.
       It merges both manifests into one injected importmap, so ia-player's
       `import 'rdflib'` resolves to the one shared rdflib — no separate <script>,
       no load-order race. sol-login is listed explicitly (it is RDF-tier, not part
       of sol-basic). data-stage="auto" → local files on localhost. -->

  <script src="https://cdn.jsdelivr.net/npm/component-interop@0.2.1/component-interop.js"
          data-stage="auto"
          data-manifest="../sol-components/dist/sol-components.manifest.json ./ia-player.manifest.json"
          data-components="sol-basic sol-feed sol-gallery sol-login ia-player sol-search sol-calendar sol-pod sol-pod-extras sol-pod-ops"
  ></script>
</head>
<body>

  <sol-default
     proxy="http://localhost:3002/proxy?uri="
     theme="dark"
     fontsize="medium"
     solid-kitchen
     data-settings="./data/generated/settings.ttl#Settings"
  ></sol-default>

  <nav class="omp-chrome-bar" aria-label="Controls">
    <sol-include
       source="assets/mini-player.html"
       trusted
    ></sol-include>
  </nav>

  <main class="omp-panels">
    <sol-include id="omp-body" trusted></sol-include>
  </main>

  <script type="module" src="./src/omp-shell.js"></script>
</body>
</html>
