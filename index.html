<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Media Player</title>
  <script src="./src/omp-boot.js"></script>
  <link rel="stylesheet" href="./assets/omp.css">
  <!-- swc components + auth come from sol-loader (parser-blocking <head> script):
       it injects the importmap (so ia-player.esm.js's `import 'rdflib'` resolves
       to the shared window.$rdf) and loads sol-login (auth), sol-feed, sol-gallery,
       and the basic UI (tabs/button/include/modal/dropdown-button/default).
       ia-player.esm.js no longer bundles rdflib or the components — it shares the
       one rdflib + one core/rdf singleton the loader establishes. -->
  <script src="../solid-web-components/dist/sol-loader.min.js"
          data-stage="local"
          data-bundles="basic feed gallery"
          data-with="auth"></script>
  <script src="./dist/ia-player.esm.js" type="module"></script>
</head>
<body>

  <sol-default
     proxy="http://localhost:3002/proxy?uri="
     theme="dark"
     fontsize="medium"
     solid-kitchen
     data-settings="./data/generated/settings.ttl#Settings"
  ></sol-default>

  <nav class="omp-chrome-bar" aria-label="Controls">
    <sol-include
       source="assets/mini-player.html"
       trusted
    ></sol-include>
  </nav>

  <main class="omp-panels">
    <sol-include id="omp-body" trusted></sol-include>
  </main>

  <script type="module" src="./src/omp-shell.js"></script>
</body>
</html>
