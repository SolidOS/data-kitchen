<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>data-kitchen</title>

  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="node_modules/sol-components/web/styles/root.css">
  <link rel="stylesheet" href="src/dk-styles.css">
  <link rel="stylesheet" href="assets/dk-chrome.css">

  <!-- Pre-paint boot: apply saved theme / text size before first paint. -->
  <script src="src/dk-boot.js"></script>

  <!-- sol-login reads the inrupt auth library from the UMD global
       window.solidClientAuthn, so the page must load it first. Vendored
       locally (assets/vendor/) — a desktop app must not depend on a CDN. -->
  <script src="assets/vendor/solid-client-authn.bundle.js"></script>

  <!-- component-interop (parser-blocking <head> script) reads both manifests —
       sol-components' first (it owns the shared specifiers: rdflib,
       solid-logic, solid-ui, …; merge is first-wins), dk's second (adds the
       ia-player plugin bundle and podz) — injects the stage-selected
       importmap, then import()s each data-components entry. dk's OWN bundle
       is loaded directly as a module below (not via the loader), so it stays
       out of the loader's import chain. -->
  <script src="node_modules/component-interop/component-interop.js"
          data-stage="auto"
          data-manifest="node_modules/sol-components/dist/sol-components.manifest.json dk.manifest.json"
          data-components="sol-basic sol-pod sol-pod-extras sol-pod-ops sol-live-edit sol-time sol-weather sol-calendar sol-search sol-feed sol-gallery sol-login sol-query menu-from-rdf rdf-bundle ia-player sol-menu-builder sol-bar-builder sol-plugins-available"
  ></script>
  <script type="module" src="dist/dk.bundle.js"></script>
</head>
<body>

  <sol-default
      label="Preferences"
      theme="dark"
      fontsize="medium"
      solid-kitchen
      proxy="http://localhost:8001/proxy?uri="
      default-issuer="https://solidcommunity.net"
      shape="node_modules/sol-components/shapes/data-kitchen-settings.shacl"
      source="data/data-kitchen-settings.ttl#Settings"
  ></sol-default>

  <nav class="omp-chrome-bar" aria-label="Controls">
    <sol-include source="plugins/ia-player/assets/mini-player.html" trusted></sol-include>
  </nav>

  <main id="dk-content" class="omp-panels">
    <sol-include id="dk-body" source="./html-first.html" trusted></sol-include>
  </main>

</body>
</html>
