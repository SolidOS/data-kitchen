<!DOCTYPE html>
<!-- Shown in an external pane's region (a native WebContentsView overlaid by
     ExternalViews) while the external app is fetching/booting, so a slow site
     doesn't leave a blank rectangle. Self-contained: no external resources. The
     host name is filled in by ExternalViews via window.dkSetHost(). -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    :root { color-scheme: light dark; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; background: #f5f6f8; color: #444;
      font: 16px/1.4 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    @media (prefers-color-scheme: dark) { body { background: #1c1f24; color: #cfd3da; } }
    .spinner {
      width: 44px; height: 44px; border-radius: 50%;
      border: 4px solid rgba(128, 128, 128, 0.3); border-top-color: #2a7de1;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { font-size: 18px; }
    .host { font-size: 16px; opacity: 0.7; max-width: 80vw; overflow-wrap: anywhere; text-align: center; }
  </style>
</head>
<body>
  <div class="spinner" aria-hidden="true"></div>
  <div class="msg">Loading…</div>
  <div class="host" id="host"></div>
  <script>
    // ExternalViews calls this with the pane's host (e.g. "keypod.solidcommunity.au").
    window.dkSetHost = function (host) {
      document.getElementById('host').textContent = host || '';
    };
  </script>
</body>
</html>
